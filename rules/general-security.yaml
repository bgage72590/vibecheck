rules:
  - id: vibecheck.cors-wildcard
    patterns:
      - pattern-either:
          - pattern: cors()
          - pattern: "cors({ origin: '*' })"
          - pattern: "cors({ origin: true })"
    message: >
      CORS is configured to allow all origins. Any website can make
      authenticated requests to your API, potentially stealing user data.
      Restrict to your frontend domain: cors({ origin: 'https://yourdomain.com' })
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: configuration
      confidence: HIGH

  - id: vibecheck.eval-usage
    pattern: eval($CODE)
    message: >
      eval() executes arbitrary code and is a major security risk.
      If $CODE contains any user input, attackers can execute arbitrary
      JavaScript on your server. Use safer alternatives like JSON.parse()
      for data or a sandboxed VM for code execution.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: injection
      confidence: HIGH

  - id: vibecheck.innerhtml-assignment
    pattern: $EL.innerHTML = $VALUE
    message: >
      Direct innerHTML assignment with dynamic values can lead to XSS.
      If $VALUE contains user input, attackers can inject malicious scripts.
      Use textContent for text, or sanitize with DOMPurify.sanitize().
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: injection
      confidence: MEDIUM

  - id: vibecheck.hardcoded-jwt-secret
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "...")
          - pattern: jwt.verify($TOKEN, "...")
          - pattern: |
              const $SECRET = "..."
              ...
              jwt.sign($PAYLOAD, $SECRET)
    message: >
      JWT secret is hardcoded in source code. Anyone with access to the
      code can forge authentication tokens. Move the secret to an
      environment variable.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: authentication
      confidence: HIGH

  - id: vibecheck.unparameterized-query
    patterns:
      - pattern-either:
          - pattern: $DB.query(`...${$VAR}...`)
          - pattern: $DB.execute(`...${$VAR}...`)
          - pattern: $DB.raw(`...${$VAR}...`)
    message: >
      SQL query built with string interpolation. This is vulnerable to
      SQL injection — attackers can modify the query to access or delete
      data. Use parameterized queries instead:
      db.query('SELECT * FROM users WHERE id = ?', [userId])
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: injection
      confidence: HIGH
